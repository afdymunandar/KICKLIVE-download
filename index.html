<body class="min-h-screen pb-20">

            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-accent rounded-lg flex items-center justify-center font-bold text-white text-lg">G</div>

    <!-- Popunder Scripts (auto load) -->
    <script src="https://adeptdoorstep.com/6e/28/35/6e2835eb66e7b47f4448bb555dde2ada.js"></script>
    <script src="https://adeptdoorstep.com/e4/1b/41/e41b41126d650d9a27878dbeb5315713.js"></script>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <!-- Game Article -->
        <article id="game-article" class="bg-darker rounded-xl p-6 mb-8">
            <div id="game-content">
                <div class="skeleton">
                    <div class="h-8 bg-gray-700 rounded w-3/4 mb-4"></div>
                    <div class="h-64 bg-gray-700 rounded mb-4"></div>
                    <div class="h-4 bg-gray-700 rounded w-full mb-2"></div>
                    <div class="h-4 bg-gray-700 rounded w-5/6 mb-2"></div>
                    <div class="h-4 bg-gray-700 rounded w-4/6"></div>
                </div>
            </div>
        </article>

        <!-- Download Button -->
        <div class="text-center mb-8">
            <button id="btn-download" onclick="handleDownload()" class="bg-accent hover:bg-blue-600 text-white font-bold py-4 px-12 rounded-xl text-lg transition transform hover:scale-105 shadow-lg shadow-blue-500/30 cursor-pointer">
                ⬇️ Download Game
            </button>
            <p class="text-gray-500 text-sm mt-3">Klik tombol di atas untuk memulai download</p>
        </div>

        <!-- Banner 300x250 Container - BISA DIDUPLIKAT -->
        <div class="ad-container" id="ad-row-300x250">
            <!-- Slot 1 -->
            <div class="ad-slot" style="width:300px;height:250px;">
                <script>
                  atOptions = {
                    'key' : '90b8ced68ab1ce3c983fa393b5141acb',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,

                <script src="https://adeptdoorstep.com/90b8ced68ab1ce3c983fa393b5141acb/invoke.js"></script>
            </div>
            <!-- Slot 2 -->
            <div class="ad-slot" style="width:300px;height:250px;">
                <script>
                  atOptions = {

                    'format' : 'iframe',

                    'width' : 300,
                    'params' : {}
                  };
                </script>
                <script src="https://adeptdoorstep.com/90b8ced68ab1ce3c983fa393b5141acb/invoke.js"></script>
            </div>
            <!-- Slot 3 -->
            <div class="ad-slot" style="width:300px;height:250px;">
                <script>
                  atOptions = {
                    'key' : '90b8ced68ab1ce3c983fa393b5141acb',

                  };
                </script>
                <script src="https://adeptdoorstep.com/90b8ced68ab1ce3c983fa393b5141acb/invoke.js"></script>
            </div>
            <!-- Slot 4 -->
            <div class="ad-slot" style="width:300px;height:250px;">
                <script>
                  atOptions = {
                    'key' : '90b8ced68ab1ce3c983fa393b5141acb',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                  };

                <script src="https://adeptdoorstep.com/90b8ced68ab1ce3c983fa393b5141acb/invoke.js"></script>
            </div>
        </div>
    </main>

    <!-- Social Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-darker border-t border-gray-800 py-3 px-4">
        <div class="max-w-4xl mx-auto flex justify-center gap-6 text-gray-400 text-sm">
            <a href="#" class="hover:text-white transition">📱 Share</a>
            <a href="#" class="hover:text-white transition">💬 Comment</a>
            <a href="#" class="hover:text-white transition">⭐ Favorite</a>
        </div>
    </div>

    <script>
        // Smartlink URL
        const URL_SMART_LINK = 'https://adeptdoorstep.com/dx5egd6h?key=7cd5fc81789226deef1669f9bb8e6bf0';

        // Load game data from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id') || 'gta5';

        // Fetch data.json
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const game = data.games.find(g => g.id === gameId) || data.games[0];
                renderGame(game);
            })
            .catch(() => {
                renderGame({
                    title: 'GTA V',
                    description: 'Grand Theft Auto V adalah game open-world action-adventure yang dikembangkan oleh Rockstar North. Game ini menawarkan pengalaman bermain yang mendalam dengan grafis yang memukau dan gameplay yang seru. Jelajahi kota Los Santos yang luas, jalankan berbagai misi menantang, dan rasakan kebebasan bermain di dunia terbuka terbaik.',
                    image: 'https://upload.wikimedia.org/wikipedia/en/a/a5/Grand_Theft_Auto_V.png',
                    video: 'https://www.youtube.com/watch?v=QkkoHAzjnUs'
                });
            });

        function renderGame(game) {
            document.getElementById('game-content').innerHTML = `
                <h1 class="text-3xl font-bold text-white mb-4">${game.title}</h1>
                <div class="relative mb-6 rounded-xl overflow-hidden">
                    <img src="${game.image}" alt="${game.title}" class="w-full h-64 object-cover" onerror="this.src='https://via.placeholder.com/800x400/1a1a1a/3b82f6?text=${encodeURIComponent(game.title)}'">
                    <div class="absolute inset-0 bg-gradient-to-t from-darker to-transparent"></div>
                    <a href="${game.video}" target="_blank" class="absolute bottom-4 left-4 bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2">
                        ▶️ Watch Trailer
                    </a>
                </div>
                <div class="prose prose-invert max-w-none">
                    <p class="text-gray-300 leading-relaxed mb-4">${game.description}</p>
                    <p class="text-gray-300 leading-relaxed mb-4">
                        Game ini sangat populer di kalangan gamer karena menawarkan berbagai fitur menarik seperti:
                    </p>
                    <ul class="list-disc list-inside text-gray-300 mb-4 space-y-2">
                        <li>Open world yang luas dan detail</li>
                        <li>Misi yang menantang dan beragam</li>
                        <li>Mode online multiplayer</li>
                        <li>Grafis yang memukau</li>
                        <li>Kustomisasi karakter dan kendaraan</li>
                    </ul>
                    <p class="text-gray-300 leading-relaxed">
                        Download sekarang dan rasakan pengalaman bermain game terbaik! Game ini tersedia untuk PC dengan spesifikasi minimum yang cukup terjangkau.
                    </p>
                </div>
            `;
        }

        function handleDownload() {
            // 1. Open smartlink in new tab (background)
            window.open(URL_SMART_LINK, '_blank');

            // 2. Keep user on current tab, then redirect to check.html
            setTimeout(() => {
                window.location.href = `check.html?id=${gameId}`;
            }, 500);
        }
    </script>
</body>
</html>
