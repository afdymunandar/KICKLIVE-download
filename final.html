<script>
  const DATA_JSON_PATH = 'data.json';
  const SMART_LINK = 'https://www.effectivecpmnetwork.com/dx5egd6h?key=7cd5fc81789226deef1669f9bb8e6bf0';
  function getUrlParam(p){ return new URLSearchParams(window.location.search).get(p); }
  const id = getUrlParam('id');

  let isFirstClick = true;
  let actualDownloadUrl = '';
  const downloadBtn = document.getElementById('downloadBtn');
  const downloadBtnText = document.getElementById('downloadBtnText');
  const downloadStatus = document.getElementById('downloadStatus');

  function showError(msg){
    document.getElementById('infoCard').classList.add('hidden');
    document.getElementById('ctaBox').classList.add('hidden');
    const box = document.getElementById('errorBox');
    box.classList.remove('hidden');
    document.getElementById('errorDetail').textContent = msg;
  }

  function renderInfo(data){
    if(data.judul){ document.getElementById('articleTitle').textContent = data.judul; document.title = data.judul + ' — Link Download Siap'; }
    if(data.gambar_logo){
      const img = document.getElementById('thumbImg');
      img.src = data.gambar_logo;
      img.onload = () => { img.classList.remove('hidden'); document.getElementById('thumbPlaceholder').classList.add('hidden'); };
    }
    actualDownloadUrl = data.linkGoFile || '';
    if(!actualDownloadUrl){
      downloadBtn.disabled = true;
      downloadBtnText.textContent = 'LINK BELUM TERSEDIA';
      downloadStatus.textContent = 'Link unduhan untuk konten ini belum dikonfigurasi.';
    }
  }

  async function loadData(){
    if(!id){ showError('Parameter "id" tidak ditemukan di URL.'); return; }
    try{
      const res = await fetch(DATA_JSON_PATH, { headers: { 'Accept':'application/json' } });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const data = JSON.parse(await res.text());
      if(data && data[id]) renderInfo(data[id]);
      else throw new Error('ID "' + id + '" tidak ditemukan di data.json');
    }catch(e){
      showError('Gagal memuat data: ' + e.message);
    }
  }
  loadData();

  downloadBtn.addEventListener('click', () => {
    if(downloadBtn.disabled) return;
    if(isFirstClick){
      const w = window.open(SMART_LINK, '_blank', 'noopener,noreferrer');
      if(w){ try{ w.blur(); window.focus(); }catch(e){} }
      isFirstClick = false;
      downloadBtn.disabled = true;
      let seconds = 5;
      downloadBtnText.textContent = 'Mohon tunggu... (' + seconds + 's)';
      downloadStatus.textContent = 'Menyiapkan link unduhan...';
      const iv = setInterval(() => {
        seconds--;
        if(seconds > 0){
          downloadBtnText.textContent = 'Mohon tunggu... (' + seconds + 's)';
        } else {
          clearInterval(iv);
          downloadBtn.disabled = false;
          downloadBtnText.textContent = 'DOWNLOAD SEKARANG';
          downloadStatus.textContent = 'Klik sekali lagi untuk mulai mengunduh.';
        }
      }, 1000);
    } else {
      if(actualDownloadUrl) window.location.href = actualDownloadUrl;
    }
  });

  function injectBanner(containerId, key, width, height){
    const el = document.getElementById(containerId);
    if(!el) return;
    const cfg = document.createElement('script');
    cfg.text = "atOptions = {'key':'" + key + "','format':'iframe','height':" + height + ",'width':" + width + ",'params':{}};";
    el.appendChild(cfg);
    const inv = document.createElement('script');
    inv.src = 'https://www.highperformanceformat.com/' + key + '/invoke.js';
    el.appendChild(inv);
  }
  injectBanner('ad-slot-top', '90b8ced68ab1ce3c983fa393b5141acb', 300, 250);
  setTimeout(() => injectBanner('ad-slot-300-1', '90b8ced68ab1ce3c983fa393b5141acb', 300, 250), 200);
  setTimeout(() => injectBanner('ad-slot-300-2', '90b8ced68ab1ce3c983fa393b5141acb', 300, 250), 400);
  setTimeout(() => injectBanner('ad-slot-160-1', '7ef34204b1387e450712372aa4083223', 160, 300), 600);
  setTimeout(() => injectBanner('ad-slot-160-2', '7ef34204b1387e450712372aa4083223', 160, 300), 800);
  setTimeout(() => injectBanner('ad-slot-160-3', '7ef34204b1387e450712372aa4083223', 160, 300), 1000);
  setTimeout(() => injectBanner('ad-slot-160-4', '7ef34204b1387e450712372aa4083223', 160, 300), 1200);
  setTimeout(() => injectBanner('ad-slot-600-1', '666efc25a783cf52a159dafec9aef351', 160, 600), 1400);
  setTimeout(() => injectBanner('ad-slot-600-2', '666efc25a783cf52a159dafec9aef351', 160, 600), 1600);
</script>
